<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수익률 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 16px 60px;
        }

        .container {
            background: #ffffff;
            padding: 36px 32px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26,115,232,0.10), 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 720px;
        }

        /* ── 헤더 ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 6px 18px rgba(26,115,232,0.35);
        }
        .header .icon i { color: white; font-size: 24px; }
        .header h1 { font-size: 24px; font-weight: 800; color: #1a1a2e; }
        .header p  { font-size: 13px; color: #888; margin-top: 6px; }

        /* ── 탭 (복리/단리) ── */
        .tab-group {
            display: flex;
            background: #f0f4ff;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 11px 0;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: #ffffff;
            color: #1a73e8;
            box-shadow: 0 2px 8px rgba(26,115,232,0.15);
        }

        /* ── 입력 폼 ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .input-group { margin-bottom: 0; }
        .input-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #444;
            font-size: 13px;
            letter-spacing: 0.01em;
        }
        .input-group label i { margin-right: 5px; color: #1a73e8; }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap input {
            width: 100%;
            padding: 13px 48px 13px 14px;
            border: 1.5px solid #e0e7ff;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: #222;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafbff;
            outline: none;
            -moz-appearance: textfield;
        }
        .input-wrap input::-webkit-inner-spin-button,
        .input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .input-wrap input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
            background: #fff;
        }
        .input-unit {
            position: absolute;
            right: 14px;
            font-size: 13px;
            color: #999;
            font-weight: 500;
            pointer-events: none;
        }
        .period-wrap { display: flex; gap: 8px; }
        .period-wrap input { flex: 1; }
        .period-wrap select {
            width: 90px;
            padding: 13px 10px;
            border: 1.5px solid #e0e7ff;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #555;
            background: #fafbff;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .period-wrap select:focus { border-color: #1a73e8; }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-section.single { grid-template-columns: 1fr; }

        /* ── 버튼 ── */
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            box-shadow: 0 4px 16px rgba(26,115,232,0.3);
            letter-spacing: 0.02em;
        }
        .calc-btn:hover {
            background: linear-gradient(135deg, #1557b0, #0a3880);
            box-shadow: 0 6px 20px rgba(26,115,232,0.4);
            transform: translateY(-1px);
        }
        .calc-btn:active { transform: translateY(0); }

        /* ── 결과 박스 ── */
        #result {
            margin-top: 28px;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-header {
            font-size: 13px;
            font-weight: 700;
            color: #1a73e8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .result-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e7ff;
        }

        .result-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .result-card {
            background: #f8faff;
            border: 1.5px solid #e0e7ff;
            border-radius: 14px;
            padding: 16px 18px;
            transition: transform 0.2s;
        }
        .result-card:hover { transform: translateY(-2px); }
        .result-card.accent-blue {
            background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
            border-color: #a8c4f8;
        }
        .result-card.accent-red {
            background: linear-gradient(135deg, #fce8e6, #fad2cf);
            border-color: #f5b8b5;
        }
        .result-card .card-label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .result-card .card-value {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1.2;
        }
        .result-card.accent-blue  .card-value { color: #1a73e8; }
        .result-card.accent-red   .card-value { color: #d93025; }

        /* ── 비율 바 ── */
        .ratio-bar-wrap {
            margin-bottom: 24px;
            padding: 16px 18px;
            background: #f8faff;
            border-radius: 14px;
            border: 1.5px solid #e0e7ff;
        }
        .ratio-bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .ratio-bar-track {
            height: 10px;
            background: #e0e7ff;
            border-radius: 99px;
            overflow: hidden;
        }
        .ratio-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a73e8, #34a853);
            border-radius: 99px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ratio-bar-desc {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .ratio-bar-desc .input-pct  { color: #1a73e8; }
        .ratio-bar-desc .profit-pct { color: #34a853; }

        /* ── 차트 ── */
        .chart-wrap {
            background: #f8faff;
            border-radius: 16px;
            border: 1.5px solid #e0e7ff;
            padding: 20px 16px 16px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* ── 비교 배지 ── */
        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .method-badge.compound { background: #e8f0fe; color: #1a73e8; }
        .method-badge.simple   { background: #fce8e6; color: #d93025; }

        /* ── 공유 버튼 ── */
        .share-btn {
            width: 100%;
            padding: 13px;
            background: #fff;
            color: #1a73e8;
            border: 2px solid #1a73e8;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .share-btn:hover {
            background: #e8f0fe;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,115,232,0.18);
        }
        .share-btn:active { transform: translateY(0); }

        /* ── 공유 모달 ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,15,40,0.45);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: backdropIn 0.2s ease;
        }
        .modal-backdrop.open { display: flex; }
        @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: #fff;
            border-radius: 20px;
            padding: 32px 28px 28px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.18);
            animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }

        .modal-close {
            position: absolute;
            top: 16px; right: 18px;
            width: 32px; height: 32px;
            border: none;
            background: #f0f4ff;
            border-radius: 50%;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .modal-close:hover { background: #e0e7ff; color: #1a73e8; }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .modal-sub {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        /* 조건 요약 */
        .share-summary {
            background: #f8faff;
            border: 1.5px solid #e0e7ff;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }
        .share-summary-item {
            font-size: 12px;
            color: #888;
        }
        .share-summary-item strong {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #222;
            margin-top: 2px;
        }

        /* URL 복사 영역 */
        .url-copy-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }
        .url-input {
            flex: 1;
            padding: 11px 14px;
            border: 1.5px solid #e0e7ff;
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            color: #555;
            background: #fafbff;
            outline: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: text;
        }
        .copy-btn {
            padding: 11px 16px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .copy-btn:hover { background: linear-gradient(135deg,#1557b0,#0a3880); }
        .copy-btn.copied {
            background: linear-gradient(135deg, #34a853, #1e7e34);
        }

        /* SNS 버튼 */
        .sns-label {
            font-size: 12px;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .sns-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .sns-btn {
            padding: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .sns-btn i { font-size: 20px; }
        .sns-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .sns-btn.kakao  { background: #FEE500; color: #3C1E1E; }
        .sns-btn.twitter { background: #000; color: #fff; }
        .sns-btn.facebook { background: #1877F2; color: #fff; }

        /* ── 반응형 ── */
        @media (max-width: 540px) {
            .container { padding: 24px 18px 32px; }
            .grid-2, .form-section { grid-template-columns: 1fr; }
            .result-cards { grid-template-columns: 1fr 1fr; }
            .result-card .card-value { font-size: 17px; }
        }
        @media (max-width: 380px) {
            .result-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 헤더 -->
    <header class="header">
        <div class="icon"><i class="fas fa-chart-line"></i></div>
        <h1>수익률 계산기</h1>
        <p>복리·단리 투자 수익을 한눈에 시뮬레이션</p>
    </header>

    <!-- 계산 방식 탭 -->
    <div class="tab-group" role="tablist">
        <button class="tab-btn active" id="tab-compound" onclick="switchTab('compound')" role="tab">
            <i class="fas fa-circle-notch"></i>&nbsp; 복리 (Compound)
        </button>
        <button class="tab-btn" id="tab-simple" onclick="switchTab('simple')" role="tab">
            <i class="fas fa-minus"></i>&nbsp; 단리 (Simple)
        </button>
    </div>
    <input type="hidden" id="calcMethod" value="compound">

    <!-- 입력 폼 -->
    <div class="form-section">
        <div class="input-group">
            <label><i class="fas fa-piggy-bank"></i>초기 투자 원금</label>
            <div class="input-wrap">
                <input type="number" id="principal" value="20000000" min="0" placeholder="0">
                <span class="input-unit">원</span>
            </div>
        </div>
        <div class="input-group">
            <label><i class="fas fa-calendar-plus"></i>매월 적립금</label>
            <div class="input-wrap">
                <input type="number" id="monthlyDeposit" value="0" min="0" placeholder="0">
                <span class="input-unit">원</span>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label><i class="fas fa-percent"></i>연평균 수익률</label>
            <div class="input-wrap">
                <input type="number" id="annualRate" value="20" step="0.1" min="0" max="100" placeholder="0">
                <span class="input-unit">%</span>
            </div>
        </div>
        <div class="input-group">
            <label><i class="fas fa-hourglass-half"></i>투자 기간</label>
            <div class="period-wrap">
                <div class="input-wrap" style="flex:1">
                    <input type="number" id="period" value="15" min="1" placeholder="0">

                </div>
                <select id="periodUnit">
                    <option value="year">년</option>
                    <option value="month">개월</option>
                </select>
            </div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="calc-btn" style="margin-top:0;" onclick="calculate()">
            <i class="fas fa-calculator"></i>&nbsp; 분석 및 차트 생성
        </button>
        <button class="share-btn" id="shareBtn" onclick="openShareModal()" style="width:auto; padding:13px 20px; margin-top:0; white-space:nowrap;" disabled>
            <i class="fas fa-share-nodes"></i> 공유
        </button>
    </div>

    <!-- 결과 영역 -->
    <section id="result" aria-live="polite">
        <div class="result-header"><i class="fas fa-poll"></i> 계산 결과</div>

        <div class="result-cards">
            <div class="result-card">
                <div class="card-label"><i class="fas fa-wallet"></i> 총 납입 원금</div>
                <div class="card-value" id="resTotalInput">—</div>
            </div>
            <div class="result-card accent-red">
                <div class="card-label"><i class="fas fa-fire"></i> 최종 수익률</div>
                <div class="card-value" id="resTotalRate">—</div>
            </div>
            <div class="result-card accent-blue">
                <div class="card-label"><i class="fas fa-coins"></i> 총 수익금</div>
                <div class="card-value" id="resProfit">—</div>
            </div>
            <div class="result-card" style="background:linear-gradient(135deg,#e6f4ea,#ceead6);border-color:#a8d5b5;">
                <div class="card-label"><i class="fas fa-trophy"></i> 최종 예상 금액</div>
                <div class="card-value" id="resFinalAmount" style="color:#1e7e34;">—</div>
            </div>
        </div>

        <!-- 원금 vs 수익 비율 바 -->
        <div class="ratio-bar-wrap">
            <div class="ratio-bar-labels">
                <span><i class="fas fa-circle" style="color:#1a73e8;font-size:9px;"></i> 납입 원금</span>
                <span>원금 vs 수익 비율</span>
                <span><i class="fas fa-circle" style="color:#34a853;font-size:9px;"></i> 수익금</span>
            </div>
            <div class="ratio-bar-track">
                <div class="ratio-bar-fill" id="ratioBarFill" style="width:50%"></div>
            </div>
            <div class="ratio-bar-desc">
                <span class="input-pct" id="inputPct">—</span>
                <span class="profit-pct" id="profitPct">—</span>
            </div>
        </div>

        <!-- 차트 -->
        <div class="chart-wrap">
            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 10px;">
            <span class="method-badge" id="methodBadge">
                <i class="fas fa-info-circle"></i> <span id="methodBadgeText">복리 계산</span>
            </span>
        </div>
    </section>
</div>

<!-- ── 공유 모달 ── -->
<div class="modal-backdrop" id="shareModal" onclick="handleBackdropClick(event)" role="dialog" aria-modal="true" aria-label="결과 공유">
    <div class="modal">
        <button class="modal-close" onclick="closeShareModal()" aria-label="닫기"><i class="fas fa-xmark"></i></button>
        <div class="modal-title"><i class="fas fa-share-nodes" style="color:#1a73e8;margin-right:6px;"></i>계산 결과 공유</div>
        <div class="modal-sub">링크를 통해 동일한 조건으로 바로 열 수 있어요</div>

        <!-- 조건 요약 -->
        <div class="share-summary" id="shareSummary">
            <div class="share-summary-item">계산 방식<strong id="ss-method">—</strong></div>
            <div class="share-summary-item">연평균 수익률<strong id="ss-rate">—</strong></div>
            <div class="share-summary-item">초기 원금<strong id="ss-principal">—</strong></div>
            <div class="share-summary-item">매월 적립금<strong id="ss-monthly">—</strong></div>
            <div class="share-summary-item">투자 기간<strong id="ss-period">—</strong></div>
            <div class="share-summary-item">최종 예상 금액<strong id="ss-final" style="color:#1e7e34;">—</strong></div>
        </div>

        <!-- URL 복사 -->
        <div class="url-copy-wrap">
            <input class="url-input" id="shareUrlInput" type="text" readonly onclick="this.select()">
            <button class="copy-btn" id="copyBtn" onclick="copyShareUrl()">
                <i class="fas fa-copy"></i> 복사
            </button>
        </div>

        <!-- SNS 공유 -->
        <div class="sns-label">바로 공유하기</div>
        <div class="sns-btns">
            <button class="sns-btn kakao" onclick="shareKakao()">
                <i class="fas fa-comment-dots"></i>
                <span>카카오톡</span>
            </button>
            <button class="sns-btn twitter" onclick="shareTwitter()">
                <i class="fa-brands fa-x-twitter"></i>
                <span>X (트위터)</span>
            </button>
            <button class="sns-btn facebook" onclick="shareFacebook()">
                <i class="fa-brands fa-facebook"></i>
                <span>페이스북</span>
            </button>
        </div>
    </div>
</div>

<script>
    let myChart = null;
    let currentTab = 'compound';

    /* ──────────────────────────────────────
       탭 전환
    ────────────────────────────────────── */
    function switchTab(method) {
        currentTab = method;
        document.getElementById('calcMethod').value = method;
        document.getElementById('tab-compound').classList.toggle('active', method === 'compound');
        document.getElementById('tab-simple').classList.toggle('active', method === 'simple');
    }

    /* ──────────────────────────────────────
       숫자 포맷 헬퍼
    ────────────────────────────────────── */
    function formatKRW(val) {
        const abs = Math.abs(val);
        if (abs >= 1e8) {
            const uk = Math.floor(abs / 1e8);
            const man = Math.round((abs % 1e8) / 1e4);
            return (val < 0 ? '-' : '') +
                (man > 0 ? `${uk.toLocaleString()}억 ${man.toLocaleString()}만원` : `${uk.toLocaleString()}억원`);
        }
        if (abs >= 1e4) {
            return (val < 0 ? '-' : '') + Math.round(abs / 1e4).toLocaleString() + '만원';
        }
        return Math.round(val).toLocaleString() + '원';
    }

    function formatChartY(value) {
        if (value >= 1e8) return (value / 1e8).toFixed(1) + '억';
        if (value >= 1e4) return (value / 1e4).toLocaleString() + '만';
        return value.toLocaleString();
    }

    /* ──────────────────────────────────────
       핵심 계산
    ────────────────────────────────────── */
    function calculate() {
        const calcMethod     = document.getElementById('calcMethod').value;
        const annualRate     = parseFloat(document.getElementById('annualRate').value) / 100;
        const principal      = parseFloat(document.getElementById('principal').value)      || 0;
        const monthlyDeposit = parseFloat(document.getElementById('monthlyDeposit').value) || 0;
        const period         = parseFloat(document.getElementById('period').value)         || 0;
        const periodUnit     = document.getElementById('periodUnit').value;

        const totalMonths = periodUnit === 'year' ? period * 12 : period;
        const monthlyRate = annualRate / 12;

        /* --- 월별 시뮬레이션 --- */
        let labels    = [];
        let dataTotal = [];
        let dataInput = [];

        // 0번째 달(시작) 초기화
        let currentAmount = principal;
        let currentInput  = principal;

        for (let m = 0; m <= totalMonths; m++) {
            if (m > 0) {
                if (calcMethod === 'compound') {
                    // ✅ 복리: 이전 잔액에 월 이자 적용 후 적립금 추가
                    currentAmount = currentAmount * (1 + monthlyRate) + monthlyDeposit;
                } else {
                    // ✅ 단리: 매달 납입 원금 누적 후,
                    //    "이번 달까지 투입된 총 원금 × 월이율" 만큼 이자 추가
                    //    (단리 원칙: 원금에만 이자, 이자에 이자 없음)
                    currentAmount += monthlyDeposit + currentInput * monthlyRate;
                }
                currentInput += monthlyDeposit;
            }

            // 차트 데이터 샘플링: 24개월 이하는 전부, 초과 시 1년 단위 + 마지막 달
            const sample = totalMonths <= 24 || m % 12 === 0 || m === totalMonths;
            if (sample) {
                const labelStr = periodUnit === 'year'
                    ? (m % 12 === 0 ? (m / 12) + '년' : (m / 12).toFixed(1) + '년')
                    : m + '개월';
                labels.push(labelStr);
                dataTotal.push(Math.round(currentAmount));
                dataInput.push(Math.round(currentInput));
            }
        }

        /* --- 최종 결과 DOM 업데이트 --- */
        const finalAmount = Math.round(currentAmount);
        const totalInput  = Math.round(currentInput);
        const profit      = finalAmount - totalInput;
        const totalRate   = totalInput > 0 ? ((finalAmount / totalInput - 1) * 100) : 0;

        document.getElementById('resTotalInput').textContent  = formatKRW(totalInput);
        document.getElementById('resFinalAmount').textContent = formatKRW(finalAmount);
        document.getElementById('resProfit').textContent      = (profit >= 0 ? '+' : '') + formatKRW(profit);
        document.getElementById('resTotalRate').textContent   = (totalRate >= 0 ? '+' : '') + totalRate.toFixed(2) + '%';

        // 비율 바
        const inputRatio  = totalInput  / finalAmount * 100;
        const profitRatio = profit      / finalAmount * 100;
        document.getElementById('ratioBarFill').style.width = inputRatio.toFixed(1) + '%';
        document.getElementById('inputPct').textContent  = '원금 ' + inputRatio.toFixed(1) + '%';
        document.getElementById('profitPct').textContent = '수익 ' + (profitRatio >= 0 ? profitRatio.toFixed(1) : '0.0') + '%';

        // 배지
        const badge     = document.getElementById('methodBadge');
        const badgeText = document.getElementById('methodBadgeText');
        badge.className = 'method-badge ' + calcMethod;
        badgeText.textContent = calcMethod === 'compound' ? '복리 계산 결과' : '단리 계산 결과';

        document.getElementById('result').style.display = 'block';

        updateChart(labels, dataTotal, dataInput);

        // 공유 버튼 활성화
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.disabled = false;
        shareBtn.style.opacity = '1';
    }

    /* ──────────────────────────────────────
       차트 렌더링
    ────────────────────────────────────── */
    function updateChart(labels, dataTotal, dataInput) {
        const ctx = document.getElementById('growthChart').getContext('2d');

        if (myChart) { myChart.destroy(); }

        // 그라디언트 배경
        const gradBlue = ctx.createLinearGradient(0, 0, 0, 300);
        gradBlue.addColorStop(0, 'rgba(26,115,232,0.25)');
        gradBlue.addColorStop(1, 'rgba(26,115,232,0.02)');

        const gradGreen = ctx.createLinearGradient(0, 0, 0, 300);
        gradGreen.addColorStop(0, 'rgba(52,168,83,0.18)');
        gradGreen.addColorStop(1, 'rgba(52,168,83,0.01)');

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: '예상 자산',
                        data: dataTotal,
                        borderColor: '#1a73e8',
                        backgroundColor: gradBlue,
                        fill: true,
                        tension: 0.45,
                        borderWidth: 2.5,
                        pointRadius: labels.length <= 16 ? 4 : 2,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#1a73e8',
                        pointBorderWidth: 2,
                    },
                    {
                        label: '납입 원금',
                        data: dataInput,
                        borderColor: '#34a853',
                        backgroundColor: gradGreen,
                        fill: true,
                        tension: 0.1,
                        borderWidth: 2,
                        borderDash: [6, 4],
                        pointRadius: labels.length <= 16 ? 3 : 1,
                        pointHoverRadius: 5,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#34a853',
                        pointBorderWidth: 2,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: { family: "'Pretendard', sans-serif", size: 13 },
                            usePointStyle: true,
                            pointStyleWidth: 14,
                            padding: 16
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(26,26,46,0.88)',
                        padding: 12,
                        titleFont: { family: "'Pretendard', sans-serif", size: 13 },
                        bodyFont:  { family: "'Pretendard', sans-serif", size: 13 },
                        callbacks: {
                            label: function(ctx) {
                                const v = ctx.parsed.y;
                                return ' ' + ctx.dataset.label + ': ' + formatKRW(v);
                            },
                            afterBody: function(items) {
                                if (items.length === 2) {
                                    const asset  = items[0].parsed.y;
                                    const input  = items[1].parsed.y;
                                    const profit = asset - input;
                                    return ['', ' 📈 수익금: ' + (profit >= 0 ? '+' : '') + formatKRW(profit)];
                                }
                                return [];
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: {
                            font: { family: "'Pretendard', sans-serif", size: 11 },
                            color: '#999'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: {
                            font: { family: "'Pretendard', sans-serif", size: 11 },
                            color: '#999',
                            callback: (v) => formatChartY(v)
                        }
                    }
                }
            }
        });
    }

    /* ──────────────────────────────────────
       공유 기능
    ────────────────────────────────────── */

    // 현재 입력값 → URL 파라미터 문자열 생성
    function buildShareURL() {
        const params = new URLSearchParams({
            m:  document.getElementById('calcMethod').value,
            r:  document.getElementById('annualRate').value,
            p:  document.getElementById('principal').value,
            md: document.getElementById('monthlyDeposit').value,
            t:  document.getElementById('period').value,
            tu: document.getElementById('periodUnit').value,
        });
        return `${location.origin}${location.pathname}?${params.toString()}`;
    }

    // 모달 열기
    function openShareModal() {
        // 요약 카드 채우기
        const method = document.getElementById('calcMethod').value;
        document.getElementById('ss-method').textContent    = method === 'compound' ? '복리' : '단리';
        document.getElementById('ss-rate').textContent      = document.getElementById('annualRate').value + '%';
        document.getElementById('ss-principal').textContent = formatKRW(parseFloat(document.getElementById('principal').value) || 0);
        document.getElementById('ss-monthly').textContent   = formatKRW(parseFloat(document.getElementById('monthlyDeposit').value) || 0);
        const periodVal  = document.getElementById('period').value;
        const periodUnit = document.getElementById('periodUnit').value;
        document.getElementById('ss-period').textContent    = periodVal + (periodUnit === 'year' ? '년' : '개월');
        document.getElementById('ss-final').textContent     = document.getElementById('resFinalAmount').textContent;

        // URL 세팅
        document.getElementById('shareUrlInput').value = buildShareURL();

        // 복사 버튼 초기화
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> 복사';

        document.getElementById('shareModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    // 모달 닫기
    function closeShareModal() {
        document.getElementById('shareModal').classList.remove('open');
        document.body.style.overflow = '';
    }

    // 배경 클릭 시 닫기
    function handleBackdropClick(e) {
        if (e.target === document.getElementById('shareModal')) closeShareModal();
    }

    // URL 클립보드 복사
    async function copyShareUrl() {
        const url = document.getElementById('shareUrlInput').value;
        const btn = document.getElementById('copyBtn');
        try {
            await navigator.clipboard.writeText(url);
        } catch {
            // 폴백: execCommand
            const input = document.getElementById('shareUrlInput');
            input.select();
            document.execCommand('copy');
        }
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fas fa-check"></i> 복사됨!';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<i class="fas fa-copy"></i> 복사';
        }, 2500);
    }

    // SNS 공유
    function buildShareText() {
        const method  = document.getElementById('calcMethod').value === 'compound' ? '복리' : '단리';
        const rate    = document.getElementById('annualRate').value;
        const period  = document.getElementById('period').value;
        const unit    = document.getElementById('periodUnit').value === 'year' ? '년' : '개월';
        const final   = document.getElementById('resFinalAmount').textContent;
        return `💰 ${method} ${rate}% / ${period}${unit} 투자 시 최종 ${final}! 수익률 계산기로 직접 확인해보세요.`;
    }

    function shareKakao() {
        const url  = buildShareURL();
        const text = buildShareText();
        // 카카오 SDK 없이 카카오톡 공유 앱 스킴 → 미지원 시 링크 복사 안내
        const kakaoUrl = `https://sharer.kakao.com/talk/friends/picker/link?app_key=KAKAO_APP_KEY&lang=ko&url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
        // 카카오 앱 키가 없으면 URL만 복사하고 안내
        navigator.clipboard.writeText(url).then(() => {
            showToast('링크가 복사됐어요! 카카오톡에 붙여넣기 해주세요 💬', '#FEE500', '#3C1E1E');
        }).catch(() => {
            window.open(kakaoUrl, '_blank', 'width=500,height=600');
        });
    }

    function shareTwitter() {
        const text = buildShareText();
        const url  = buildShareURL();
        window.open(
            `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
            '_blank', 'width=560,height=460'
        );
    }

    function shareFacebook() {
        const url = buildShareURL();
        window.open(
            `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
            '_blank', 'width=580,height=480'
        );
    }

    // 토스트 알림
    function showToast(msg, bg = '#1a73e8', color = '#fff') {
        const existing = document.getElementById('toast-msg');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'toast-msg';
        toast.textContent = msg;
        Object.assign(toast.style, {
            position: 'fixed', bottom: '32px', left: '50%',
            transform: 'translateX(-50%) translateY(20px)',
            background: bg, color: color,
            padding: '12px 22px', borderRadius: '99px',
            fontSize: '14px', fontWeight: '700',
            boxShadow: '0 6px 24px rgba(0,0,0,0.15)',
            zIndex: '9999', transition: 'all 0.3s cubic-bezier(0.34,1.56,0.64,1)',
            whiteSpace: 'nowrap', fontFamily: 'inherit',
        });
        document.body.appendChild(toast);
        requestAnimationFrame(() => {
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast.style.opacity = '1';
        });
        setTimeout(() => {
            toast.style.transform = 'translateX(-50%) translateY(20px)';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2800);
    }

    /* ──────────────────────────────────────
       URL 파라미터 자동 복원
    ────────────────────────────────────── */
    function restoreFromURL() {
        const p = new URLSearchParams(location.search);
        if (!p.has('m')) return false; // 파라미터 없으면 기본값 사용

        const method = p.get('m') || 'compound';
        switchTab(method);
        if (p.has('r'))  document.getElementById('annualRate').value      = p.get('r');
        if (p.has('p'))  document.getElementById('principal').value        = p.get('p');
        if (p.has('md')) document.getElementById('monthlyDeposit').value   = p.get('md');
        if (p.has('t'))  document.getElementById('period').value           = p.get('t');
        if (p.has('tu')) document.getElementById('periodUnit').value        = p.get('tu');
        return true;
    }

    /* ── ESC 키로 모달 닫기 ── */
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeShareModal();
        if (e.key === 'Enter' && !document.getElementById('shareModal').classList.contains('open')) calculate();
    });

    /* ── 초기 실행: URL 복원 후 계산 ── */
    window.addEventListener('load', () => {
        const restored = restoreFromURL();
        calculate();
        if (restored) {
            showToast('🔗 공유된 계산 조건이 불러와졌어요!', '#1a73e8', '#fff');
        }
    });
</script>
