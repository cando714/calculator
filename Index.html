<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수익률 계산기</title>
    <!-- Chart.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 700px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .flex-group { display: flex; gap: 8px; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        
        #result { margin-top: 25px; padding: 20px; background-color: #f8f9fa; border-radius: 12px; display: none; border-left: 5px solid #1a73e8; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-item { font-size: 15px; color: #666; }
        .result-val { display: block; font-size: 18px; font-weight: bold; color: #222; margin-top: 4px; }
        .highlight { color: #d93025; }

        .chart-container { margin-top: 30px; position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>💰 수익률 계산기</h2>

    <div class="grid-input">
        <div class="input-group">
            <label>계산 방식</label>
            <select id="calcMethod">
                <option value="compound">복리 (Compound)</option>
                <option value="simple">단리 (Simple)</option>
            </select>
        </div>
        <div class="input-group">
            <label>연평균 수익률 (%)</label>
            <input type="number" id="annualRate" value="8" step="0.1">
        </div>
    </div>

    <div class="grid-input">
        <div class="input-group">
            <label>초기 투자 원금 (원)</label>
            <input type="number" id="principal" value="10000000">
        </div>
        <div class="input-group">
            <label>매월 적립금 (원)</label>
            <input type="number" id="monthlyDeposit" value="300000">
        </div>
    </div>

    <div class="input-group">
        <label>투자 기간</label>
        <div class="flex-group">
            <input type="number" id="period" value="15">
            <select id="periodUnit" style="width: 120px;">
                <option value="year">년</option>
                <option value="month">개월</option>
            </select>
        </div>
    </div>

    <button onclick="calculate()">분석 및 차트 생성</button>

    <div id="result">
        <div class="result-grid">
            <div class="result-item">총 납입 원금 <span class="result-val" id="resTotalInput">0원</span></div>
            <div class="result-item">최종 수익률 <span class="result-val highlight" id="resTotalRate">0%</span></div>
            <div class="result-item">총 수익금 <span class="result-val" id="resProfit" style="color:#1a73e8">0원</span></div>
            <div class="result-item">최종 예상 금액 <span class="result-val" id="resFinalAmount">0원</span></div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="growthChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    function calculate() {
        const calcMethod = document.getElementById('calcMethod').value;
        const annualRate = parseFloat(document.getElementById('annualRate').value) / 100;
        const principal = parseFloat(document.getElementById('principal').value) || 0;
        const monthlyDeposit = parseFloat(document.getElementById('monthlyDeposit').value) || 0;
        const period = parseFloat(document.getElementById('period').value) || 0;
        const periodUnit = document.getElementById('periodUnit').value;

        const totalMonths = periodUnit === 'year' ? period * 12 : period;
        const monthlyRate = annualRate / 12;

        let labels = [];
        let dataTotal = []; // 최종 자산
        let dataInput = []; // 납입 원금

        let currentAmount = principal;
        let currentInput = principal;

        // 월별 데이터 추적 (차트용)
        for (let m = 0; m <= totalMonths; m++) {
            if (m > 0) {
                if (calcMethod === 'compound') {
                    // 복리 계산
                    currentAmount = (currentAmount + monthlyDeposit) * (1 + monthlyRate);
                } else {
                    // 단리 계산 (간소화: 매월 원금에 대해 이자 발생)
                    currentAmount += monthlyDeposit + (principal * monthlyRate) + (monthlyDeposit * (m/totalMonths) * annualRate);
                }
                currentInput += monthlyDeposit;
            }

            // 1년 단위 혹은 마지막 달만 차트 데이터에 추가 (성능 및 시각화 최적화)
            if (totalMonths <= 24 || m % 12 === 0 || m === totalMonths) {
                labels.push(periodUnit === 'year' ? (m/12).toFixed(1) + '년' : m + '개월');
                dataTotal.push(Math.round(currentAmount));
                dataInput.push(Math.round(currentInput));
            }
        }

        // 결과 업데이트
        document.getElementById('resTotalInput').innerText = Math.round(currentInput).toLocaleString() + "원";
        document.getElementById('resFinalAmount').innerText = Math.round(currentAmount).toLocaleString() + "원";
        document.getElementById('resProfit').innerText = Math.round(currentAmount - currentInput).toLocaleString() + "원";
        document.getElementById('resTotalRate').innerText = ((currentAmount / currentInput - 1) * 100).toFixed(2) + "%";
        document.getElementById('result').style.display = 'block';

        // 차트 그리기
        updateChart(labels, dataTotal, dataInput);
    }

    function updateChart(labels, dataTotal, dataInput) {
        const ctx = document.getElementById('growthChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy(); // 기존 차트 삭제
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '예상 자산',
                        data: dataTotal,
                        borderColor: '#1a73e8',
                        backgroundColor: 'rgba(26, 115, 232, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '납입 원금',
                        data: dataInput,
                        borderColor: '#9aa0a6',
                        borderDash: [5, 5],
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y.toLocaleString() + '원';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                if (value >= 100000000) return (value / 100000000).toFixed(1) + '억원';
                                if (value >= 10000) return (value / 10000).toLocaleString() + '만원';
                                return value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }

    // 초기 실행
    window.onload = calculate;
</script>

</body>
</html>
